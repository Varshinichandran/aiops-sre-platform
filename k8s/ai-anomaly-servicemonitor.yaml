apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-anomaly-service
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: ai-anomaly-service
  namespaceSelector:
    matchNames:
      - aiops
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
