apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-fastapi
  namespace: aiops
  labels:
    app: aiops-fastapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aiops-fastapi
  template:
    metadata:
      labels:
        app: aiops-fastapi
    spec:
      containers:
      - name: aiops-fastapi
        image: yourdockerhubusername/aiops-fastapi:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-fastapi-service
  namespace: aiops
  labels:
    app: aiops-fastapi
spec:
  type: ClusterIP
  selector:
    app: aiops-fastapi
  ports:
  - name: http
    port: 80
    targetPort: 8000
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: aiops-fastapi-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: aiops-fastapi
  namespaceSelector:
    matchNames:
    - aiops
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
